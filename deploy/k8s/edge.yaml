apiVersion: v1
kind: Namespace
metadata:
  name: fraudsim-edge
---
apiVersion: v1
kind: Secret
metadata:
  name: fraudsim-api-secret
  namespace: fraudsim-edge
type: Opaque
stringData:
  api-key: replace-before-production
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraudsim-models
  namespace: fraudsim-edge
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraudsim-data
  namespace: fraudsim-edge
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: fraudsim-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: fraudsim-edge
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: fraudsim-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - {name: KAFKA_NODE_ID, value: "1"}
            - {name: KAFKA_PROCESS_ROLES, value: "broker,controller"}
            - {name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093"}
            - {name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093"}
            - {name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092"}
            - {name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"}
            - {name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER"}
            - {name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT"}
            - {name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1"}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: fraudsim-edge
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-api
  namespace: fraudsim-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-api
  template:
    metadata:
      labels:
        app: model-api
    spec:
      containers:
        - name: model-api
          image: fraudsim/model-api:latest
          ports:
            - containerPort: 8000
          env:
            - {name: FRAUDSIM_KAFKA_BOOTSTRAP, value: "kafka:9092"}
            - {name: FRAUDSIM_REDIS_URL, value: "redis://redis:6379/0"}
            - {name: FRAUDSIM_AUDIT_KAFKA_ENABLED, value: "true"}
            - name: FRAUDSIM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fraudsim-api-secret
                  key: api-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - {name: models, mountPath: /app/models}
            - {name: data, mountPath: /app/data/processed}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: fraudsim-models
        - name: data
          persistentVolumeClaim:
            claimName: fraudsim-data
---
apiVersion: v1
kind: Service
metadata:
  name: model-api
  namespace: fraudsim-edge
spec:
  selector:
    app: model-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: fraudsim-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-jobmanager
  template:
    metadata:
      labels:
        app: flink-jobmanager
    spec:
      containers:
        - name: flink-jobmanager
          image: fraudsim/flink:latest
          args: ["jobmanager"]
          ports:
            - containerPort: 8081
          env:
            - {name: FLINK_PROPERTIES, value: "jobmanager.rpc.address: flink-jobmanager"}
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: fraudsim-edge
spec:
  selector:
    app: flink-jobmanager
  ports:
    - {name: ui, port: 8081, targetPort: 8081}
    - {name: rpc, port: 6123, targetPort: 6123}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: fraudsim-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink-taskmanager
  template:
    metadata:
      labels:
        app: flink-taskmanager
    spec:
      containers:
        - name: flink-taskmanager
          image: fraudsim/flink:latest
          args: ["taskmanager"]
          env:
            - {name: FLINK_PROPERTIES, value: "jobmanager.rpc.address: flink-jobmanager\ntaskmanager.numberOfTaskSlots: 2"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-risk-job
  namespace: fraudsim-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-risk-job
  template:
    metadata:
      labels:
        app: flink-risk-job
    spec:
      containers:
        - name: flink-risk-job
          image: fraudsim/flink:latest
          command: ["bash", "-lc"]
          args: ["sleep 20 && flink run -m flink-jobmanager:8081 -py /app/fraudsim/streaming/flink_job.py"]
          env:
            - {name: FRAUDSIM_KAFKA_BOOTSTRAP, value: "kafka:9092"}
            - {name: FRAUDSIM_REDIS_URL, value: "redis://redis:6379/0"}
            - {name: FRAUDSIM_API_URL, value: "http://model-api:8000"}
            - {name: FRAUDSIM_SCORING_MODE, value: "microbatch"}
            - {name: FRAUDSIM_BATCH_SIZE, value: "50"}
            - {name: FRAUDSIM_BATCH_LINGER_MS, value: "300"}
            - {name: FLINK_PROPERTIES, value: "jobmanager.rpc.address: flink-jobmanager"}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-model-api
  namespace: fraudsim-edge
spec:
  podSelector:
    matchLabels:
      app: model-api
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - {protocol: TCP, port: 8000}
